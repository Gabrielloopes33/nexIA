      GOTRUE_EXTERNAL_TWITTER_CLIENT_ID: ${EXTERNAL_TWITTER_CLIENT_ID:-}
      GOTRUE_EXTERNAL_TWITTER_SECRET: ${EXTERNAL_TWITTER_SECRET:-}
      GOTRUE_EXTERNAL_TWITTER_REDIRECT_URI: ${EXTERNAL_TWITTER_REDIRECT_URI:-}
      GOTRUE_EXTERNAL_SLACK_ENABLED: ${EXTERNAL_SLACK_ENABLED:-}
      GOTRUE_EXTERNAL_SLACK_CLIENT_ID: ${EXTERNAL_SLACK_CLIENT_ID:-}
      GOTRUE_EXTERNAL_SLACK_SECRET: ${EXTERNAL_SLACK_SECRET:-}
      GOTRUE_EXTERNAL_SLACK_REDIRECT_URI: ${EXTERNAL_SLACK_REDIRECT_URI:-}
