[build]
  command = "pnpm install && npx prisma generate && pnpm run build"
  publish = ".next"

[build.environment]
  NEXT_TELEMETRY_DISABLED = "1"
  NODE_VERSION = "20"

# Deploy contexts - controla builds por branch
[context.production]
  command = "pnpm install && npx prisma generate && pnpm run build"

[context.develop]
  command = "pnpm install && npx prisma generate && pnpm run build"

[[plugins]]
  package = "@netlify/plugin-nextjs"
