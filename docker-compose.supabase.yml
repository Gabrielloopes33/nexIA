      GOTRUE_TRACING_EXPORTER: ${TRACING_EXPORTER:-}
      GOTRUE_TRACING_HOST: ${TRACING_HOST:-}
      GOTRUE_TRACING_PORT: ${TRACING_PORT:-}
      GOTRUE_TRACING_ATTRIBUTES: ${TRACING_ATTRIBUTES:-}

      GOTRUE_COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      GOTRUE_COOKIE_NAME: ${COOKIE_NAME:-sb}

      GOTRUE_SSO_JWK_URL: ${SSO_JWK_URL:-}
      GOTRUE_SSO_JWK_KEY_ID: ${SSO_JWK_KEY_ID:-}
