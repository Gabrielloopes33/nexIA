      GOTRUE_SESSIONS_INACTIVITY_TIMEOUT: ${SESSIONS_INACTIVITY_TIMEOUT:-}
      GOTRUE_SESSIONS_TIMEBOX: ${SESSIONS_TIMEBOX:-}
      GOTRUE_SESSIONS_SINGLE_PER_USER: ${SESSIONS_SINGLE_PER_USER:-}

