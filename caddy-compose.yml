# Caddy - Proxy Reverso com SSL Automático
# Roda na VPS junto com o Supabase

version: '3.8'

services:
  caddy:
    image: caddy:2-alpine
    container_name: caddy-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3 QUIC
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - supabase_network  # Mesma rede do Supabase
    environment:
      - SUPABASE_IP=49.13.228.89

volumes:
  caddy_data:
  caddy_config:

networks:
  supabase_network:
    external: true  # Usa a rede existente do Supabase
