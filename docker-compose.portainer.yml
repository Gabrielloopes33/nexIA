# ============================================
# Docker Compose - NexIA para Portainer
# Usa imagem pré-construída do GitHub Container Registry
# ============================================

version: '3.8'

services:
  app:
    image: ghcr.io/gabrielloopes33/nexia:latest
    container_name: nexia-portainer
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - AUTH_SECRET=${AUTH_SECRET}
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
    networks:
      - nexia-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Se precisar de volumes persistentes para uploads
    volumes:
      - nexia-uploads:/app/public/uploads

networks:
  nexia-network:
    driver: bridge

volumes:
  nexia-uploads:
