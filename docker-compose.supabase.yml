      GOTRUE_EXTERNAL_WORKOS_REDIRECT_URI: ${EXTERNAL_WORKOS_REDIRECT_URI:-}
      GOTRUE_EXTERNAL_ZOOM_ENABLED: ${EXTERNAL_ZOOM_ENABLED:-}
      GOTRUE_EXTERNAL_ZOOM_CLIENT_ID: ${EXTERNAL_ZOOM_CLIENT_ID:-}
      GOTRUE_EXTERNAL_ZOOM_SECRET: ${EXTERNAL_ZOOM_SECRET:-}
      GOTRUE_EXTERNAL_ZOOM_REDIRECT_URI: ${EXTERNAL_ZOOM_REDIRECT_URI:-}

      GOTRUE_HOOK_MFA_VERIFICATION_ATTEMPT_ENABLED: ${HOOK_MFA_VERIFICATION_ATTEMPT_ENABLED:-false}
      GOTRUE_HOOK_MFA_VERIFICATION_ATTEMPT_URI: ${HOOK_MFA_VERIFICATION_ATTEMPT_URI:-}
      GOTRUE_HOOK_MFA_VERIFICATION_ATTEMPT_SECRETS: ${HOOK_MFA_VERIFICATION_ATTEMPT_SECRETS:-}
