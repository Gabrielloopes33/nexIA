# ============================================
# Docker Compose - NexIA Development
# ============================================

version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: nexia-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - AUTH_SECRET=${AUTH_SECRET}
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    depends_on:
      - db
    networks:
      - nexia-network
    restart: unless-stopped

  # PostgreSQL local (opcional para dev)
  db:
    image: postgres:15-alpine
    container_name: nexia-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=nexia
      - POSTGRES_PASSWORD=nexia_password
      - POSTGRES_DB=nexia
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - nexia-network
    restart: unless-stopped

  # Redis para cache/sessões (opcional)
  redis:
    image: redis:7-alpine
    container_name: nexia-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - nexia-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  nexia-network:
    driver: bridge
