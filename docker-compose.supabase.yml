      GOTRUE_SECURITY_CAPTCHA_PROVIDER: ${SECURITY_CAPTCHA_PROVIDER:-}
      GOTRUE_SECURITY_CAPTCHA_SECRET: ${SECURITY_CAPTCHA_SECRET:-}
      GOTRUE_SECURITY_REFRESH_TOKEN_ROTATION_ENABLED: ${SECURITY_REFRESH_TOKEN_ROTATION_ENABLED:-true}
      GOTRUE_SECURITY_REFRESH_TOKEN_REUSE_INTERVAL: ${SECURITY_REFRESH_TOKEN_REUSE_INTERVAL:-10}
      GOTRUE_SECURITY_MANUAL_LINKING_ENABLED: ${SECURITY_MANUAL_LINKING_ENABLED:-false}
      GOTRUE_SECURITY_UPDATE_PASSWORD_REQUIRE_REAUTHENTICATION: ${SECURITY_UPDATE_PASSWORD_REQUIRE_REAUTHENTICATION:-false}
