  # ============================================
  # 4. REST (PostgREST) - API REST automática
  # ============================================
  rest:
    image: postgrest/postgrest:v12.2.0
    container_name: supabase-rest
    restart: unless-stopped
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD}@db:5432/postgres
      PGRST_DB_SCHEMAS: ${PGRST_DB_SCHEMAS:-public,storage,graphql_public}
      PGRST_DB_EXTRA_SEARCH_PATH: ${PGRST_DB_EXTRA_SEARCH_PATH:-extensions}
      PGRST_DB_ANON_ROLE: anon
      PGRST_OPENAPI_SERVER_PROXY_URI: ${PGRST_OPENAPI_SERVER_PROXY_URI:-http://localhost:8000/rest/v1}
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_ADMIN_SERVER_PORT: ${PGRST_ADMIN_SERVER_PORT:-3001}
    networks:
      - supabase-network
    depends_on:
      - db

  # ============================================
  # 5. REALTIME - WebSockets/Realtime
  # ============================================
  realtime:
    image: supabase/realtime:v2.28.32
    container_name: supabase-realtime
    restart: unless-stopped
    environment:
      PORT: 4000
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: supabase_admin
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: postgres
      DB_SSL: ${DB_SSL:-disable}
      DB_AFTER_CONNECT_QUERY: ${DB_AFTER_CONNECT_QUERY:-}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-10}
      DB_ENC_KEY: ${DB_ENC_KEY:-}
      DNS_NODES: "''"
      JWT_SECRET: ${JWT_SECRET}
      JWT_AUTH_AS_CLAIMS: ${JWT_AUTH_AS_CLAIMS:-}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:-UpNVUnnYqO7OGHkuCrO6ehjNS9Z9d+DHWYU2MSaEXDNt4X/RVLlNdZ0KndNcsRar}
      FLY_APP_NAME: realtime
      FLY_ALLOC_ID: fly123
      FLY_REGION: iad
      FLY_ALLOC_VERSION: 123
      FLY_IMAGE_REF: realtime:latest
      FLY_IMAGE_VERSION: latest
      FLY_PRIVATE_IP: 127.0.0.1
      FLY_PUBLIC_IP: 127.0.0.1
      FLY_VM_MEMORY_MB: 1024
      FLY_VM_CPU_COUNT: 2
      FLY_VM_SIZE: shared-cpu-2x
      FLY_VM_KIND: shared
      FLY_APP_INSTANCE: 123
      FLY_APP_NAME: realtime
      FLY_ALLOC_ID: fly123
      FLY_REGION: iad
      FLY_ALLOC_VERSION: 123
      FLY_IMAGE_REF: realtime:latest
      FLY_IMAGE_VERSION: latest
      FLY_PRIVATE_IP: 127.0.0.1
      FLY_PUBLIC_IP: 127.0.0.1
      FLY_VM_MEMORY_MB: 1024
      FLY_VM_CPU_COUNT: 2
      FLY_VM_SIZE: shared-cpu-2x
      FLY_VM_KIND: shared
      FLY_APP_INSTANCE: 123
      ERL_AFLAGS: -proto_dist inet_tcp
      ENABLE_TAILSCALE: false
      ECTO_IPV6: false
      DNS_CLUSTER_QUERY: ${DNS_CLUSTER_QUERY:-}
      MAX_CHANNELS_PER_CLIENT: ${MAX_CHANNELS_PER_CLIENT:-100}
      MAX_CONCURRENT_USERS: ${MAX_CONCURRENT_USERS:-}
      MAX_EVENTS_PER_SECOND: ${MAX_EVENTS_PER_SECOND:-}
      MAX_JOINS_PER_SECOND: ${MAX_JOINS_PER_SECOND:-}
      MAX_SUBSCRIBERS: ${MAX_SUBSCRIBERS:-}
      MAX_JOIN_PAYLOAD_SIZE: ${MAX_JOIN_PAYLOAD_SIZE:-}
      MAX_OUTBOUND_TIMEOUT: ${MAX_OUTBOUND_TIMEOUT:-}
      LOG_LEVEL: ${LOG_LEVEL:-}
      METRICS_JVM_PERIOD: ${METRICS_JVM_PERIOD:-}
      METRICS_CIVIC_PERIOD: ${METRICS_CIVIC_PERIOD:-}
      METRICS_POLYGON_PERIOD: ${METRICS_POLYGON_PERIOD:-}
      METRICS_RUNNING_INTERVAL: ${METRICS_RUNNING_INTERVAL:-}
      METRICS_COUNTRY_PERIOD: ${METRICS_COUNTRY_PERIOD:-}
      METRICS_ICE_SERVER_PERIOD: ${METRICS_ICE_SERVER_PERIOD:-}
      METRICS_RUNNER_STATS_INTERVAL: ${METRICS_RUNNER_STATS_INTERVAL:-}
      REGION: ${REGION:-}
      SLOT_NAME_SUFFIX: ${SLOT_NAME_SUFFIX:-}
      TEMPORARY_SLOT: ${TEMPORARY_SLOT:-}
      SYSTEM_CHANNEL: ${SYSTEM_CHANNEL:-}
      SYSTEM_CHANNEL_NAME: ${SYSTEM_CHANNEL_NAME:-}
      RUN_JANITOR: ${RUN_JANITOR:-}
    networks:
      - supabase-network
    depends_on:
      - db

  # ============================================
  # 6. STORAGE - Armazenamento de arquivos
  # ============================================
  storage:
    image: supabase/storage-api:v1.10.1
    container_name: supabase-storage
    restart: unless-stopped
    environment:
      ANON_KEY: ${ANON_KEY}
      SERVICE_KEY: ${SERVICE_ROLE_KEY}
      POSTGREST_URL: http://rest:3000
      PGRST_JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgres://supabase_storage_admin:${POSTGRES_PASSWORD}@db:5432/postgres
      FILE_SIZE_LIMIT: 52428800
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: stub
      REGION: ${STORAGE_REGION:-us-east-1}
      GLOBAL_S3_BUCKET: ${STORAGE_S3_BUCKET:-}
      GLOBAL_S3_ENDPOINT: ${STORAGE_S3_ENDPOINT:-}
      GLOBAL_S3_PROTOCOL: ${STORAGE_S3_PROTOCOL:-https}
      GLOBAL_S3_FORCE_PATH_STYLE: ${STORAGE_S3_FORCE_PATH_STYLE:-true}
      AWS_ACCESS_KEY_ID: ${STORAGE_S3_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${STORAGE_S3_SECRET_ACCESS_KEY:-}
      AWS_DEFAULT_REGION: ${STORAGE_REGION:-us-east-1}
      UPLOAD_FILE_SIZE_LIMIT: ${UPLOAD_FILE_SIZE_LIMIT:-52428800}
      UPLOAD_SIGNED_URL_EXPIRATION_TIME: ${UPLOAD_SIGNED_URL_EXPIRATION_TIME:-120}
      TUS_URL_PATH: ${TUS_URL_PATH:-/upload/resumable}
      TUS_URL_EXPIRY_MS: ${TUS_URL_EXPIRY_MS:-86400000}
      IMAGE_TRANSFORMATION_ENABLED: ${IMAGE_TRANSFORMATION_ENABLED:-true}
      IMGPROXY_URL: http://imgproxy:5001
      IMGPROXY_REQUEST_TIMEOUT: 15
      DATABASE_MIGRATIONS: ${STORAGE_DATABASE_MIGRATIONS:-}
      PGOPTIONS: -c search_path=storage,public
      ADMIN_API_KEYS: ${SERVICE_ROLE_KEY}
      ENCRYPTION_KEY: ${STORAGE_ENCRYPTION_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOGFLARE_ENABLED: ${LOGFLARE_ENABLED:-false}
      LOGFLARE_API_KEY: ${LOGFLARE_API_KEY:-}
      LOGFLARE_SOURCE_TOKEN: ${LOGFLARE_SOURCE_TOKEN:-}
      LOGFLARE_FLUSH_INTERVAL: ${LOGFLARE_FLUSH_INTERVAL:-}
    volumes:
      - supabase-storage-data:/var/lib/storage
    networks:
      - supabase-network
    depends_on:
      - db
      - rest

  # ============================================
  # 7. IMGPROXY - Transformação de imagens
  # ============================================
  imgproxy:
    image: darthsim/imgproxy:v3.8.0
    container_name: supabase-imgproxy
    restart: unless-stopped
    environment:
      IMGPROXY_BIND: ":5001"
      IMGPROXY_LOCAL_FILESYSTEM_ROOT: /tmp
      IMGPROXY_USE_ETAG: "true"
      IMGPROXY_ENABLE_WEBP_DETECTION: ${IMGPROXY_ENABLE_WEBP_DETECTION:-true}
    networks:
      - supabase-network

  # ============================================
  # 8. META (pg-meta) - Metadados do PostgreSQL
  # ============================================
  meta:
    image: supabase/postgres-meta:v0.84.2
    container_name: supabase-meta
    restart: unless-stopped
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: db
      PG_META_DB_PORT: 5432
      PG_META_DB_NAME: postgres
      PG_META_DB_USER: supabase_admin
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - supabase-network
    depends_on:
      - db

  # ============================================
  # 9. EDGE FUNCTIONS (Functions)
  # ============================================
  functions:
    image: supabase/edge-runtime:v1.54.6
    container_name: supabase-edge-functions
    restart: unless-stopped
    environment:
      JWT_SECRET: ${JWT_SECRET}
      SUPABASE_URL: http://kong:8000
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      SUPABASE_DB_URL: postgresql://supabase_functions_admin:${POSTGRES_PASSWORD}@db:5432/postgres
      # TODO: ALLOW ALL CORS
      SUPABASE_FUNCTIONS_VERIFY_JWT: ${FUNCTIONS_VERIFY_JWT:-true}
    volumes:
      - ./supabase/volumes/functions:/home/deno/functions:Z
    networks:
      - supabase-network
    depends_on:
      - analytics
      - db
      - rest

  # ============================================
  # 10. ANALYTICS (Logflare) - Logs e Analytics
  # ============================================
  analytics:
    image: supabase/logflare:1.4.0
    container_name: supabase-analytics
    restart: unless-stopped
    environment:
      LOGGER_API_TOKEN: ${LOGGER_API_TOKEN:-}
      LOGFLARE_NODE_HOST: 127.0.0.1
      POSTGRES_BACKEND_URL: postgresql://supabase_admin:${POSTGRES_PASSWORD}@db:5432/postgres
      POSTGRES_BACKEND_SCHEMA: _analytics
      LOGFLARE_API_KEY: ${LOGFLARE_API_KEY:-}
      LOGFLARE_PRIVATE_ACCESS_MODE: true
      LOGFLARE_RATE_LIMIT: "1000"
      LOGFLARE_LOGGER_BACKEND: postgres
      LOGFLARE_ENV: production
      LOGFLARE_FEATURE_FLAG_OVERRIDE: multibackend
      DB_USER: supabase_admin
      DB_DATABASE: postgres
      DB_HOSTNAME: db
      DB_PORT: 5432
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_SCHEMA: _analytics
      POSTGRES_BACKEND_URL: postgresql://supabase_admin:${POSTGRES_PASSWORD}@db:5432/postgres
      POSTGRES_BACKEND_SCHEMA: _analytics
      LOGFLARE_SINGLE_TENANT: true
      LOGFLARE_SUPABASE_MODE: true
    networks:
      - supabase-network
    depends_on:
      - db

  # ============================================
  # 11. VECTOR - Para AI/Embeddings (opcional)
  # ============================================
  vector:
    image: timberio/vector:0.28.1-alpine
    container_name: supabase-vector
    restart: unless-stopped
    environment:
      LOGFLARE_API_KEY: ${LOGFLARE_API_KEY:-}
      LOGFLARE_TOKEN: ${LOGFLARE_TOKEN:-}
      LOGFLARE_URL: http://analytics:4000
      SUPABASE_URL: http://kong:8000
    command: ["--config", "etc/vector/vector.yml"]
    volumes:
      - ./supabase/volumes/logs/vector.yml:/etc/vector/vector.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - supabase-network
    depends_on:
      - analytics
      - db

  # ============================================
  # 12. DB - PostgreSQL com extensões Supabase
  # ============================================
  db:
    image: supabase/postgres:15.1.1.61
    container_name: supabase-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_HOST: /var/run/postgresql
      PGPORT: 5432
      POSTGRES_PORT: 5432
      PGPASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: postgres
      POSTGRES_DB: postgres
      POSTGRES_INITDB_ARGS: "--lc-ctype=C.UTF-8"
    volumes:
      - supabase-postgres-data:/var/lib/postgresql/data
      - ./supabase/volumes/db/realtime.sql:/docker-entrypoint-initdb.d/migrations/99-realtime.sql:Z
      - ./supabase/volumes/db/webhooks.sql:/docker-entrypoint-initdb.d/init-scripts/98-webhooks.sql:Z
      - ./supabase/volumes/db/roles.sql:/docker-entrypoint-initdb.d/init-scripts/99-roles.sql:Z
      - ./supabase/volumes/db/jwt.sql:/docker-entrypoint-initdb.d/init-scripts/99-jwt.sql:Z
      - ./supabase/volumes/db/logs.sql:/docker-entrypoint-initdb.d/migrations/99-logs.sql:Z
      - ./supabase/volumes/db/_supabase.sql:/docker-entrypoint-initdb.d/migrations/97-_supabase.sql:Z
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-d", "postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - supabase-network

# ============================================
# Volumes
# ============================================
volumes:
  supabase-postgres-data:
    driver: local
  supabase-storage-data:
    driver: local

# ============================================
# Networks
# ============================================
networks:
  supabase-network:
    driver: bridge
    name: supabase-network
