      GOTRUE_HOOK_CUSTOM_ACCESS_TOKEN_URI: ${HOOK_CUSTOM_ACCESS_TOKEN_URI:-}
      GOTRUE_HOOK_CUSTOM_ACCESS_TOKEN_SECRETS: ${HOOK_CUSTOM_ACCESS_TOKEN_SECRETS:-}
